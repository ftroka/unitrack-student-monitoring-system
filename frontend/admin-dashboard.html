<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | UniTrack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <h2>UniTrack</h2>
    <a href="admin-dashboard.html">Dashboard</a>
    <a href="#">Users</a>
    <a href="#">Roles</a>
    <a href="#">System Data</a>
    <a href="login.html">Logout</a>
  </aside>

  <main class="dashboard-content">
    <div class="dashboard-header">
      <div>
        <h1>Admin Dashboard</h1>
        <p>Manage users, roles, and academic system information.</p>
      </div>
    </div>

    <section class="dashboard-cards">
      <div class="dashboard-card">
        <span>Total Users</span>
        <strong id="totalUsers">0</strong>
      </div>

      <div class="dashboard-card">
        <span>Students</span>
        <strong id="totalStudentUsers">0</strong>
      </div>

      <div class="dashboard-card">
        <span>Instructors</span>
        <strong id="totalInstructorUsers">0</strong>
      </div>
    </section>

    <section class="dashboard-panel">
      <h2>Users From API</h2>

      <table>
        <thead>
          <tr>
            <th>Full Name</th>
            <th>Email</th>
            <th>Role</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr>
            <td colspan="3">Loading users...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
